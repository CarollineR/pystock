{% extends "base.html" %}

{% block content %}

<h2>Bem-vindo ao PyStock</h2>

<p>Sistema de gerenciamento de estoque.</p>

<div class="cards">
    <div class="card">
        <h3>Total de Produtos</h3>
        <p>0</p>
    </div>
    <div class="card">
        <h3>Total em Estoque</h3>
        <p>0</p>
    </div>
</div>

<div class="actions">
    <a href="{{ url_for('produtos') }}" class="btn">
    Ver Produtos
    </a>

    <a href="{{ url_for('cadastro') }}" class="btn">
    Cadastrar Produto
    </a>

    <a href="{{ url_for('buscar') }}" class="btn">
        Buscar Produto
    </a>

    <a href="{{ url_for('entrada') }}">
        Entrada de Estoque
    </a>
</div>

{% endblock %}
