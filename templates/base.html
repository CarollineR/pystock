<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyStock</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header>
        <h1>PyStock</h1>
    </header>

    {% with mensagens = get_flashed_messages() %}

        {% if mensagens %}

            {% for mensagem in mensagens %}
                <p>{{ mensagem }}</p>
            {% endfor %}

        {% endif %}

    {% endwith %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
