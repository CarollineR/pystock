{% extends "base.html" %}

{% block content %}

<h2>Produtos</h2>

{% if produtos %}

<table>

    <tr>
        <th>Produto</th>
        <th>Quantidade</th>
    </tr>

    {% for produto in produtos %}

    <tr>
        <td>{{ produto["nome"] }}</td>
        <td>{{ produto["quantidade"] }}</td>
    </tr>

    {% endfor %}

</table>

{% else %}

<p>Nenhum produto cadastrado até o momento.</p>

{% endif %}

<br>

<a href="/cadastro">Cadastrar Produto</a>

{% endblock %}
