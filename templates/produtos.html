{% extends "base.html" %}

{% block content %}

<h2>Produtos</h2>

<table>

    <tr>
        <th>Produto</th>
        <th>Quantidade</th>
    </tr>

    {% for produto in produtos %}

    <tr>
        <td>{{ produto["nome"] }}</td>
        <td>{{ produto["quantidade"] }}</td>
    </tr>

    {% endfor %}

</table>

{% endblock %}
